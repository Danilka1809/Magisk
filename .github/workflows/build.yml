name: Build My APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create a file
        run: echo "Это мой уникальный файл" > my_file.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-apk-file
          path: my_file.txt
