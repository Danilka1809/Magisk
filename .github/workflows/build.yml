name: Build APK from WebView

on:
  workflow_dispatch:  # Запуск кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Устанавливаем Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. Скачиваем готовый шаблон WebView приложения
      - name: Download WebView template
        run: |
          git clone https://github.com/SheikhAmin/Android-WebView-App-Template.git app
          cd app
          rm -rf .git
          sed -i 's/Example App/Telegram Clone/g' app/src/main/res/values/strings.xml
          sed -i 's/example.com/web.telegram.org/g' app/app/src/main/java/com/example/webview/MainActivity.java

      # 3. Собираем APK
      - name: Build APK
        run: |
          cd app
          chmod +x gradlew
          ./gradlew assembleDebug

      # 4. Загружаем результат
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Clone
          path: app/app/build/outputs/apk/debug/app-debug.apk
